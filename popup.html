<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniSnap</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span class="title">OmniSnap</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="toggle-track">
          <span class="toggle-thumb"></span>
        </span>
      </button>
    </header>

    <main class="tools-grid">
      <button class="tool-card" data-tool="screenshot">
        <div class="tool-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M7 5V3M17 5V3M7 19V21M17 19V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tool-info">
          <span class="tool-name">Screenshot</span>
          <span class="tool-desc">Capture visible area</span>
        </div>
      </button>

      <button class="tool-card" data-tool="fullpage">
        <div class="tool-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 9H21M9 3V21" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 6L9 3M15 21L18 18M18 6L15 3M6 18L9 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="tool-info">
          <span class="tool-name">Full Page</span>
          <span class="tool-desc">Capture entire page</span>
        </div>
      </button>

      <button class="tool-card" data-tool="colorpicker">
        <div class="tool-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" fill="currentColor"/>
            <path d="M12 3V6M12 18V21M3 12H6M18 12H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="tool-info">
          <span class="tool-name">Color Picker</span>
          <span class="tool-desc">Pick any color</span>
        </div>
      </button>
    </main>

    <footer class="footer">
      <span class="shortcuts">Ctrl+Shift+1 • 2 • 3</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
